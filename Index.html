<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mg__2.k - VIP TRICK PANEL</title>
    <style>
        :root { 
            --main-color: #00ffcc; 
            --discord-color: #5865F2;
            --bg-panel: rgba(0, 0, 0, 0.85); /* Fundo do painel um pouco transparente */
            --bg-option: rgba(0, 0, 0, 0.4); /* Fundo das opções bem transparente */
        }

        body { 
            background-image: url('https://i.postimg.cc/3JxXRBGf/Screenshot-20260312-105026-3.jpg'); 
            background-size: contain; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-color: #000000; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        .panel { 
            width: 300px; 
            background: var(--bg-panel);
            border: 2px solid var(--main-color); 
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.5); 
            position: relative;
            z-index: 10;
        }

        h2 { text-align: center; color: var(--main-color); text-transform: uppercase; letter-spacing: 3px; margin: 0; text-shadow: 0 0 10px var(--main-color); font-size: 22px; }
        .credits { text-align: center; font-size: 11px; color: #00ffcc; margin-bottom: 20px; font-weight: bold; letter-spacing: 1px; }
        
        /* Campo de Entrada da Key Transparente */
        input[type="text"] { 
            width: 91%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            background: var(--bg-option); /* Transparente */
            color: white; 
            outline: none; 
            text-align: center; 
            font-weight: bold; 
            border: 1px solid #333; 
            transition: 0.3s; 
        }
        
        button { width: 100%; padding: 12px; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; margin-bottom: 10px; }
        
        .btn-main { background: var(--main-color); color: black; }
        .btn-main:hover { background: #fff; transform: scale(1.03); box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }

        .btn-discord { background: var(--discord-color); color: white; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-size: 11px; }
        .btn-discord:hover { background: #4752c4; transform: scale(1.03); box-shadow: 0 0 15px rgba(88, 101, 242, 0.6); }

        /* Opções Mais Transparentes */
        .option { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
            padding: 10px; 
            background: var(--bg-option); /* Bem Transparente */
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .option span { font-size: 11px; text-transform: uppercase; font-weight: bold; color: #eee; }
        
        .switch { position: relative; width: 38px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: var(--main-color); box-shadow: 0 0 10px var(--main-color); }

        #loading-box { display: none; margin-top: 15px; }
        .bar-bg { width: 100%; background: #222; height: 8px; border-radius: 10px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: var(--main-color); transition: 0.3s; }
        #status-txt { font-size: 10px; text-align: center; color: var(--main-color); margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="panel" id="login-screen">
    <h2>LOGIN</h2>
    <p class="credits">BY: Mg__2.k</p>
    <input type="text" id="key-input" placeholder="DIGITE SUA KEY">
    <button class="btn-main" id="btn-login" onclick="verificarKeyOnline()">VERIFICAR ACESSO</button>
    
    <div id="loading-box">
        <div class="bar-bg"><div class="bar-fill" id="progress-bar"></div></div>
        <div id="status-txt">Iniciando...</div>
    </div>
</div>

<div class="panel" id="mod-menu" style="display:none;">
    <h2>TRICK PANEL</h2>
    <p class="credits">STATUS: <span style="color: #00ff00;">ONLINE</span> | BY: Mg__2.k</p>

    <div class="option" style="border: 1px solid #ffcc00; background: rgba(255, 204, 0, 0.1);">
        <span style="color: #ffcc00;">🛡️ BYPASS ANTI-LOGS</span>
        <label class="switch"><input type="checkbox" id="bypass-check" onclick="ativarBypass()"><span class="slider"></span></label>
    </div>

    <div class="option"><span>NO RECUO 80%</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
    <div class="option"><span>HS CAPA 80%</span><label class="switch"><input type="checkbox" class="hs-opt" onclick="travaHS(this)"><span class="slider"></span></label></div>
    <div class="option"><span>HS CAPA 85%</span><label class="switch"><input type="checkbox" class="hs-opt" onclick="travaHS(this)"><span class="slider"></span></label></div>
    <div class="option"><span>HS CAPA 95% (VIP)</span><label class="switch"><input type="checkbox" class="hs-opt" onclick="travaHS(this)"><span class="slider"></span></label></div>
    <div class="option"><span>FPS BOOST</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
    <div class="option"><span>ANTI LAG</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
  
    <button class="btn-main" onclick="injetarScripts()">INJETAR AGORA</button>
    
    <button class="btn-discord" onclick="window.open('https://discord.gg/KCrcubaWhc', '_blank')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.062 14.062 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.125-.094.252-.192.37-.29a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.196.373.29a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.874.89.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        SUPORTE DISCORD
    </button>
</div>

<script>
    // 1. Funções de Menu
    function travaHS(el) {
        if (el.checked) {
            document.querySelectorAll('.hs-opt').forEach(hs => { if (hs !== el) hs.checked = false; });
        }
    }

    function ativarBypass() {
        const check = document.getElementById('bypass-check');
        if(check.checked) {
            alert("🛡️ Mg__2.k: Bypass Injetado com Sucesso!");
        }
    }

    // 2. Função de Injetar que abre o Free Fire e mostra SetEdit
    function injetarScripts() {
        // Alerta com códigos SetEdit (Simulando Regedit VIP)
        alert("🚀 Mg__2.k: Scripts Injetados com Sucesso!\n\nUse esses códigos no SetEdit:\n1. touch.pressure.scale -> 0.001\n2. view.scroll_friction -> 10\n\nAbrindo Free Fire...");

        // Abre o Free Fire normal
        window.location.href = "android-app://com.dts.freefireth";

        // Método alternativo se o primeiro falhar
        setTimeout(function() {
            window.location.href = "intent://#Intent;scheme=package;package=com.dts.freefireth;end";
        }, 500);
    }

    // 3. Sistema de Login Online (Pastebin)
    async function verificarKeyOnline() {
        const inputKey = document.getElementById('key-input').value.trim();
        const loadingBox = document.getElementById('loading-box');
        const progressBar = document.getElementById('progress-bar');
        const statusTxt = document.getElementById('status-txt');
        const btnLogin = document.getElementById('btn-login');

        if(!inputKey) return alert("Digite a Key!");

        btnLogin.style.display = "none";
        loadingBox.style.display = "block";

        try {
            const urlRaw = "https://pastebin.com/raw/LYR2LUfj"; // Link do seu Pastebin
            const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(urlRaw);
            
            const response = await fetch(proxyUrl);
            const data = await response.json();
            const linhas = data.contents.split(/\r?\n/);

            let acesso = false;
            let erroMsg = "Key Inválida!";
            const hoje = new Date();
            hoje.setHours(0,0,0,0);

            for (let linha of linhas) {
                const parts = linha.trim().split('|');
                if (parts.length < 2) continue;
                if (parts[0].trim() === inputKey) {
                    const validade = parts[1].trim();
                    if (validade.toUpperCase() === "PERMANENTE") { acesso = true; break; }
                    if (new Date(validade + "T00:00:00") >= hoje) { acesso = true; break; }
                    else { erroMsg = "Key Expirada!"; }
                }
            }

            for(let i=0; i<=100; i+=20){
                progressBar.style.width = i + "%";
                statusTxt.innerText = "Validando... " + i + "%";
                await new Promise(r => setTimeout(r, 150));
            }

            if (acesso) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('mod-menu').style.display = 'block';
            } else {
                alert(erroMsg);
                location.reload(); // Recarrega para limpar
            }
        } catch (e) {
            alert("Erro de Conexão com o Banco de Dados!");
            location.reload();
        }
    }
</script>

</body>
</html>
